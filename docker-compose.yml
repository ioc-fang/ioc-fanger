version: '3.4'

# Docker is intentionally minimal here: it exists to generate and compare a
# Linux benchmark baseline in an environment that matches CI. For everyday
# development (test/lint/dev shell), use uv directly — see docs/local-dev.md.

services:
  _base:
    &base
    build:
      dockerfile: Dockerfile
      context: .
    volumes:
      - ./:/code

  test-benchmarks:
    <<: *base
    # the `-c "."` prevents pytest from using the config specified in the pyproject.toml (which we don't want to use for benchmarks)
    command: uv run pytest -c "." --benchmark-storage=.benchmarks/Linux-CPython-3.14-64bit/ --benchmark-compare=0001 --benchmark-compare-fail=mean:30% --benchmark-columns='mean,stddev,median,iqr,outliers' tests/benchmarks.py

  update-benchmarks:
    <<: *base
    command: >
      bash -c "
        uv run pytest -c '.' --benchmark-storage=.benchmarks/ --benchmark-save=benchmark tests/benchmarks.py &&
        mv .benchmarks/Linux-CPython-3.14-64bit/0002_benchmark.json .benchmarks/Linux-CPython-3.14-64bit/0001_benchmark.json"
